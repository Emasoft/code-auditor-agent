# git-cliff configuration for code-auditor-agent
# See https://git-cliff.org/docs/configuration

[changelog]
# Header rendered once at the top of CHANGELOG.md
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""

# Per-release body template (Tera).
# Whitespace control: {%- %} strips leading whitespace, {% -%} strips
# trailing. We produce exactly one blank line between sections so the
# output satisfies markdownlint MD012 (no multiple blank lines).
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}

{% for commit in commits -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif -%}
{% if commit.breaking %}[**breaking**] {% endif -%}
{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor -%}
{% endfor %}
"""

# No footer
footer = ""

# Trim leading/trailing whitespace from each release body
trim = true

# Render body even when there are no releases to process
render_always = false

# Regex-based postprocessors applied to the final rendered changelog
postprocessors = []

[git]
# Parse commits according to the conventional commits specification
conventional_commits = true

# Exclude commits that do not match the conventional commits specification
filter_unconventional = false

# Require all commits to be conventional (takes precedence over filter_unconventional)
require_conventional = false

# Split commits on newlines, treating each line as an individual commit
split_commits = false

# Regex-based preprocessors applied before parsing
commit_preprocessors = []

# Prevent breaking commits from being excluded by commit parsers
protect_breaking_commits = true

# Commit type -> group mapping. Order is preserved in the output.
# Numeric prefixes in HTML comments control sort order only, stripped on render.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Refactor" },
    { message = "^doc", group = "<!-- 4 -->Documentation" },
    { message = "^test", group = "<!-- 5 -->Tests" },
    { message = "^style", group = "<!-- 6 -->Styling" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore\\(deps", skip = true },
    { message = "^release:", skip = true },
    { message = "^chore", group = "<!-- 7 -->Chores" },
    { message = "^ci", group = "<!-- 7 -->Chores" },
    { message = "^build", group = "<!-- 7 -->Chores" },
    { body = ".*security", group = "<!-- 8 -->Security" },
    { message = "^revert", group = "<!-- 9 -->Revert" },
    { message = ".*", group = "<!-- 99 -->Other" },
]

# Exclude commits that are not matched by any commit parser
filter_commits = false

# Fail on a commit that is not matched by any commit parser
fail_on_unmatched_commit = false

# Link parsers for extracting external references
link_parsers = []

# Include only tags that belong to the current branch
use_branch_tags = false

# Order releases topologically instead of chronologically
topo_order = false

# Order of commits within each group
sort_commits = "oldest"

# Tag pattern for release detection
tag_pattern = "v[0-9]+.[0-9]+.[0-9]+"
