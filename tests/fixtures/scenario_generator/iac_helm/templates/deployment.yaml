apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiny-fixture-web
  labels:
    app.kubernetes.io/name: tiny-fixture
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tiny-fixture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tiny-fixture
    spec:
      containers:
        - name: web
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: tiny-fixture-web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tiny-fixture
  ports:
    - port: 80
      targetPort: 80
