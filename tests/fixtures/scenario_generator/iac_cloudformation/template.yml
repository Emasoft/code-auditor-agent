# fixture for iac_cloudformation (root template — .yml extension)
AWSTemplateFormatVersion: '2010-09-09'
Description: Tiny CloudFormation template used as a discoverer fixture.

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: tiny-fixture-data
      VersioningConfiguration:
        Status: Enabled

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tiny-fixture-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH

  WorkerQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: tiny-fixture-worker
      VisibilityTimeout: 60

Outputs:
  BucketName:
    Value: !Ref DataBucket
  TableName:
    Value: !Ref SessionsTable
