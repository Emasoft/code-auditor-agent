; PlatformIO config — two envs, two frameworks.
; Used by the firmware_platformio discoverer tests.

[platformio]
default_envs = uno_arduino, esp32_idf

[env:uno_arduino]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600

[env:esp32_idf]
platform = espressif32
board = esp32dev
framework = espidf
monitor_speed = 115200
