# fixture for rtos_zephyr — primary content trigger requires both
# CONFIG_KERNEL* and CONFIG_THREAD* substrings in prj.conf. This file
# only carries kernel/thread settings to emphasise the RTOS variant of
# Zephyr (not the broader firmware framework angle).

CONFIG_KERNEL_THREAD_NAME=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_KERNEL_BIN_NAME="zephyr"
CONFIG_MAIN_STACK_SIZE=2048
