name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-install-project --extra dev

      - name: Lint all source files
        # ruff directly — the vendored lint_files.py wrapper was removed with the
        # local CPV validator copies (2026-06-11 de-vendoring); markdown/yaml/manifest
        # checks run inside the CPV remote gate below.
        run: uv run ruff check .

      - name: Run plugin validation (CPV remote gate)
        run: |
          # The plugin vendors NO validators: validation is the CPV plugin invoked
          # remotely via uvx, same gate publish.py runs.
          # Exit codes: 0=pass, 1=CRITICAL, 2=MAJOR, 3=MINOR, 4=NIT
          # CI blocks on CRITICAL (1) and MAJOR (2) only.
          # Any code outside 0-4 is unexpected (network failure, segfault,
          # SIGINT, etc.) — fail the step so environment breakage is visible.
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation --with pyyaml \
            cpv-remote-validate plugin . 2>&1 | tee validation-report.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          if [ "$exit_code" -eq 1 ] || [ "$exit_code" -eq 2 ]; then
            exit $exit_code
          fi
          if [ "$exit_code" -lt 0 ] || [ "$exit_code" -gt 4 ]; then
            echo "::error::cpv-remote-validate: unexpected exit $exit_code"
            exit $exit_code
          fi

      - name: Check version consistency
        # Inline (the vendored check_version_consistency.py was removed): the two
        # version sources the marketplace chain depends on must agree.
        run: |
          PJ=$(uv run python -c "import json;print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          PT=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "plugin.json=$PJ pyproject.toml=$PT"
          if [ "$PJ" != "$PT" ]; then
            echo "::error::version mismatch: plugin.json=$PJ pyproject.toml=$PT"
            exit 1
          fi

      - name: Pipeline-efficacy quality gate (TRDD-7e364ace)
        # HARD GATE: every script-backed detector in the 24-step
        # bug-detection pipeline must catch every bug pattern it
        # claims to catch. A single missed code fails the build.
        # See tests/integration/test_pipeline_efficacy.py.
        run: uv run pytest tests/integration/ -v --tb=short

      - name: Validation step summary
        if: always()
        run: |
          if [ -f validation-report.txt ]; then
            echo "## Plugin Validation Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat validation-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
