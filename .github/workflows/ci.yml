name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-install-project --extra dev

      - name: Lint Python scripts
        run: uv run ruff check scripts/ --output-format=github

      - name: Format check Python scripts
        run: uv run ruff format --check scripts/

      - name: Type check Python scripts
        run: uv run mypy scripts/ --ignore-missing-imports || true

      - name: ShellCheck shell scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts/
          severity: warning

      - name: Validate plugin.json
        run: uv run python -c "import json; json.load(open('.claude-plugin/plugin.json', encoding='utf-8')); print('plugin.json is valid JSON')"

      - name: Check version consistency
        run: uv run scripts/check_version_consistency.py

      - name: Plugin integrity validation
        run: uv run scripts/validate_plugin_integrity.py
