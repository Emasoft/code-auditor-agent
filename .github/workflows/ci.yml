name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-install-project --extra dev

      - name: Lint all source files
        run: uv run python scripts/lint_files.py .

      - name: Run plugin validation
        run: |
          # Exit codes: 0=pass, 1=CRITICAL, 2=MAJOR, 3=MINOR, 4=NIT
          # CI blocks on CRITICAL (1) and MAJOR (2) only.
          # Any code outside 0-4 is unexpected (missing script, segfault,
          # SIGINT, etc.) — fail the step so environment breakage is visible.
          set +e
          uv run python scripts/validate_plugin.py . 2>&1 | tee validation-report.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          if [ "$exit_code" -eq 1 ] || [ "$exit_code" -eq 2 ]; then
            exit $exit_code
          fi
          if [ "$exit_code" -lt 0 ] || [ "$exit_code" -gt 4 ]; then
            echo "::error::validate_plugin.py: unexpected exit $exit_code"
            exit $exit_code
          fi

      - name: Check version consistency
        run: uv run python scripts/check_version_consistency.py --plugin-dir .

      - name: Pipeline-efficacy quality gate (TRDD-7e364ace)
        # HARD GATE: every script-backed detector in the 24-step
        # bug-detection pipeline must catch every bug pattern it
        # claims to catch. A single missed code fails the build.
        # See tests/integration/test_pipeline_efficacy.py.
        run: uv run pytest tests/integration/ -v --tb=short

      - name: Validation step summary
        if: always()
        run: |
          if [ -f validation-report.txt ]; then
            echo "## Plugin Validation Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat validation-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
