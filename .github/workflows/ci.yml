name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-install-project --extra dev

      - name: Lint all source files
        run: uv run python scripts/lint_files.py .

      - name: Run plugin validation
        run: |
          # Exit codes: 0=pass, 1=CRITICAL, 2=MAJOR, 3=MINOR, 4=NIT
          # CI blocks on CRITICAL (1) and MAJOR (2) only
          exit_code=0
          uv run python scripts/validate_plugin.py . || exit_code=$?
          if [ "$exit_code" -eq 1 ] || [ "$exit_code" -eq 2 ]; then
            exit $exit_code
          fi
