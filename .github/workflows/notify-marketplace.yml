name: Notify Marketplace

on:
  push:
    branches: [main, master]
    paths:
      - ".claude-plugin/plugin.json"
      - "agents/**"
      - "skills/**"
      - "commands/**"
      - "scripts/**"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Dispatch to marketplace
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MARKETPLACE_PAT }}
          repository: Emasoft/emasoft-plugins
          event-type: plugin-updated
          client-payload: '{"plugin": "ai-maestro-code-auditor-agent", "version": "${{ steps.version.outputs.version }}", "repository": "${{ github.repository }}"}'
