name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          uv python install 3.12
          uv tool install bandit==1.9.4
          uv tool install pip-audit==2.10.0

      - name: Run Bandit (static analysis)
        continue-on-error: true
        run: |
          mkdir -p "$RUNNER_TEMP/security-results"
          bandit -r scripts/ -ll -f json -o "$RUNNER_TEMP/security-results/bandit-report.json" || true
          echo "## Bandit Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat "$RUNNER_TEMP/security-results/bandit-report.json" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run pip-audit (dependency vulnerabilities)
        continue-on-error: true
        run: |
          pip-audit --requirement <(uv pip compile pyproject.toml --quiet) --format json --output "$RUNNER_TEMP/security-results/pip-audit-report.json"
          echo "## pip-audit Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat "$RUNNER_TEMP/security-results/pip-audit-report.json" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Install TruffleHog
        run: |
          # No pipe-to-shell: download the PINNED release tarball, verify its sha256
          # against the value recorded here from the release's checksums.txt, then
          # extract. Stronger supply-chain posture than running the upstream install
          # script, and provably inert to security scanners.
          TRUFFLEHOG_VERSION="3.88.26"
          TARBALL="trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          SHA256="d35ef713f2fc1c7495292bfd31a3a907ef07d7358fe77fd07e879abf7bebbe95"
          INSTALL_DIR="${RUNNER_TOOL_CACHE:-/tmp}/trufflehog"
          mkdir -p "$INSTALL_DIR"
          curl -sSfL -o "$RUNNER_TEMP/$TARBALL" \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/${TARBALL}"
          echo "$SHA256  $RUNNER_TEMP/$TARBALL" | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/$TARBALL" -C "$INSTALL_DIR" trufflehog
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Run TruffleHog (secret scanning - advisory)
        continue-on-error: true
        run: |
          trufflehog filesystem . --json > "$RUNNER_TEMP/security-results/trufflehog-report.json" 2> "$RUNNER_TEMP/security-results/trufflehog-stderr.log" || true
          echo "## TruffleHog Results" >> $GITHUB_STEP_SUMMARY
          if [ -s "$RUNNER_TEMP/security-results/trufflehog-report.json" ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -100 "$RUNNER_TEMP/security-results/trufflehog-report.json" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No secrets detected." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Dependabot alerts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          alert_count=$(gh api "repos/${REPO_NAME}/dependabot/alerts" --jq 'length' 2>/dev/null || echo "N/A")
          echo "## Dependabot Alerts" >> $GITHUB_STEP_SUMMARY
          echo "Open alerts: ${alert_count}" >> $GITHUB_STEP_SUMMARY

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-scan-results
          path: ${{ runner.temp }}/security-results/
          retention-days: 30
