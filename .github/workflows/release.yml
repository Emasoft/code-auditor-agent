name: Release Validation

# Safety net: validates tag pushes and produces a validation report
# artifact. The actual GitHub release is created by scripts/publish.py
# via `gh release create` before the tag ever reaches origin — this
# workflow just double-checks that what was published is still valid.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint all source files
        run: uv run python scripts/lint_files.py .

      - name: Run test suite
        run: uv run pytest tests/ -v

      - name: Validate plugin (CPV remote execution, strict)
        run: |
          set +e
          uvx --from git+https://github.com/Emasoft/claude-plugins-validation \
              --with pyyaml \
              cpv-remote-validate plugin . --verbose --strict \
              2>&1 | tee validation-report.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          if [ "$exit_code" -ne 0 ]; then
            echo "::error::Plugin validation failed (exit $exit_code)"
            exit $exit_code
          fi

      - name: Validation step summary
        if: always()
        run: |
          if [ -f validation-report.txt ]; then
            echo "## Plugin Validation Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat validation-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.txt
          retention-days: 30
