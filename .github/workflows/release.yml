name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --no-install-project --extra dev

      - name: Lint all source files
        run: uv run python scripts/lint_files.py .

      - name: Validate plugin
        run: |
          set +e
          uv run python scripts/validate_plugin.py . 2>&1 | tee validation-report.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          if [ "$exit_code" -eq 1 ] || [ "$exit_code" -eq 2 ]; then
            exit $exit_code
          fi
          if [ "$exit_code" -ge 3 ]; then
            echo "::warning::Plugin validation found issues (exit code $exit_code). See validation-report.txt."
          fi

      - name: Validation step summary
        if: always()
        run: |
          if [ -f validation-report.txt ]; then
            echo "## Plugin Validation Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat validation-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --max-count=50 --pretty=format:"- %s (%h)" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}")
          fi
          # Use dynamic delimiter to prevent commit messages from injecting output boundaries
          DELIM="CHANGELOG_DELIMITER_$(date +%s%N)"
          {
            echo "CHANGELOG<<${DELIM}"
            echo "$LOG"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body: |
            ## Changes

            ${{ steps.changelog.outputs.CHANGELOG }}
          files: validation-report.txt
