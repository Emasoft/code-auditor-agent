[project]
name = "ai-maestro-code-auditor-agent"
version = "2.0.0"
description = "Three-phase PR review pipeline and full codebase audit pipeline for Claude Code"
requires-python = ">=3.12"
license = "MIT"
authors = [
    { name = "Emasoft", email = "713559+Emasoft@users.noreply.github.com" },
]

[project.optional-dependencies]
dev = [
    "mypy>=1.13.0",
    "ruff>=0.8.0",
    "pyyaml>=6.0",
    "types-pyyaml>=6.0",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.pyright]
pythonVersion = "3.12"
